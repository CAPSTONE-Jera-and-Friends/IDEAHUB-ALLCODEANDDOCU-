name: Import Validation & Deployment Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  import-validation:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Validate all imports
      run: |
        python scripts/validate_imports.py
      continue-on-error: false
    
    - name: Check for StaffPerformance import errors
      run: |
        # This grep should find NO matches (correct)
        ! grep -r "from app.models import.*StaffPerformance[^L]" app/ routes/ services/ || exit 1
        echo "✓ No incorrect StaffPerformance imports found"
    
    - name: Lint Python files
      run: |
        pip install pylint
        pylint app/ --disable=missing-module-docstring --exit-zero || true
      continue-on-error: true
    
    - name: Run tests (if available)
      run: |
        pip install pytest
        pytest tests/ || echo "No tests found, skipping"
      continue-on-error: true

  production-readiness:
    needs: import-validation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test app initialization
      run: |
        python -c "from app import create_app; app = create_app(); print('✓ App initialization successful')"
    
    - name: Verify critical models
      run: |
        python -c "
        from app.models import StaffPerformanceLog, User, Order, StaffAttendance
        print('✓ All critical models imported successfully')
        print(f'  - StaffPerformanceLog: {StaffPerformanceLog.__name__}')
        print(f'  - User: {User.__name__}')
        print(f'  - Order: {Order.__name__}')
        print(f'  - StaffAttendance: {StaffAttendance.__name__}')
        "
    
    - name: Check for deprecated model names
      run: |
        python << 'EOF'
        import ast
        import os
        
        deprecated_names = ['StaffPerformance']
        found_issues = False
        
        for root, dirs, files in os.walk('app'):
            # Skip __pycache__
            if '__pycache__' in root:
                continue
            
            for file in files:
                if file.endswith('.py'):
                    filepath = os.path.join(root, file)
                    with open(filepath, 'r') as f:
                        content = f.read()
                        for deprecated in deprecated_names:
                            if deprecated in content and 'from app.models import' in content:
                                # Check if it's an actual import
                                if f'import.*{deprecated}' in content:
                                    print(f"✗ Found deprecated import in {filepath}: {deprecated}")
                                    found_issues = True
        
        if not found_issues:
            print("✓ No deprecated model names found")
        else:
            exit(1)
        EOF
