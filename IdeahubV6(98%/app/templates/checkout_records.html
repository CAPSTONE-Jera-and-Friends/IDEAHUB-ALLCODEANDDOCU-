{% extends "layout.html" %}

{% block title %}Checkout Records{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="d-flex flex-column flex-md-row justify-content-md-between align-items-md-center gap-3 mb-3">
    <div>
      <h3 class="mb-0">Checkout Records</h3>
      <small id="checkout-count" class="text-muted">0 records</small>
    </div>
    <!-- Search + Date filters: responsive layout -->
    <div class="checkout-filters">
      <input
        type="text"
        id="checkoutSearch"
        class="form-control"
        placeholder="Search customer..."
        oninput="loadCheckoutRecords()"
      >
      <div class="d-flex gap-2 align-items-center">
        <input
          type="date"
          id="dateFrom"
          class="form-control"
          oninput="loadCheckoutRecords()"
          title="From date"
        >
        <span class="text-muted d-none d-md-inline">–</span>
        <input
          type="date"
          id="dateTo"
          class="form-control"
          oninput="loadCheckoutRecords()"
          title="To date"
        >
      </div>
      <select id="paymentFilter" class="form-select" onchange="loadCheckoutRecords()">
        <option value="">All payments</option>
        <option value="cash">Cash</option>
        <option value="gcash">GCash</option>
      </select>
      <button class="btn btn-outline-secondary btn-sm py-2 w-100" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div id="payment-summary" class="row g-2 mb-3" style="display:none;"></div>

  <!-- Records rendered here, grouped by month -->
  <div id="checkout-records-container">
    <p class="text-center text-muted py-4">Loading...</p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function formatTime(seconds) {
  if (seconds === null || seconds === undefined) return "N/A";
  const s = Number(seconds);
  const hrs  = Math.floor(s / 3600);
  const mins = Math.floor((s % 3600) / 60);
  const secs = s % 60;
  return `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
}

// Format "YYYY-MM" → "January 2026"
function monthLabel(yearMonth) {
  const [y, m] = yearMonth.split("-").map(Number);
  const d = new Date(y, m - 1, 1);
  return d.toLocaleString("en-US", { month: "long", year: "numeric" });
}

function paymentBadge(method) {
  if (method === "gcash") {
    return '<span class="badge bg-primary">GCash</span>';
  }
  return '<span class="badge bg-success">Cash</span>';
}

function clearFilters() {
  document.getElementById("checkoutSearch").value = "";
  document.getElementById("dateFrom").value = "";
  document.getElementById("dateTo").value   = "";
  document.getElementById("paymentFilter").value = "";
  loadCheckoutRecords();
}

function renderPaymentSummary(records) {
  const summaryEl = document.getElementById("payment-summary");
  if (!records.length) {
    summaryEl.style.display = "none";
    summaryEl.innerHTML = "";
    return;
  }

  let cashTotal = 0;
  let gcashTotal = 0;
  let cashCount = 0;
  let gcashCount = 0;

  for (const record of records) {
    if (record.payment_method === "gcash") {
      gcashTotal += record.total_bill;
      gcashCount += 1;
    } else {
      cashTotal += record.total_bill;
      cashCount += 1;
    }
  }

  summaryEl.style.display = "flex";
  summaryEl.innerHTML = `
    <div class="col-md-4">
      <div class="card border-success h-100">
        <div class="card-body py-2">
          <small class="text-muted">Cash</small>
          <div class="fw-bold">₱${cashTotal.toFixed(2)} <span class="text-muted fw-normal">(${cashCount})</span></div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-primary h-100">
        <div class="card-body py-2">
          <small class="text-muted">GCash</small>
          <div class="fw-bold">₱${gcashTotal.toFixed(2)} <span class="text-muted fw-normal">(${gcashCount})</span></div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-dark h-100">
        <div class="card-body py-2">
          <small class="text-muted">Grand Total</small>
          <div class="fw-bold">₱${(cashTotal + gcashTotal).toFixed(2)} <span class="text-muted fw-normal">(${records.length})</span></div>
        </div>
      </div>
    </div>
  `;
}

function loadCheckoutRecords() {
  const search   = document.getElementById("checkoutSearch").value.toLowerCase().trim();
  const dateFrom = document.getElementById("dateFrom").value;
  const dateTo   = document.getElementById("dateTo").value;
  const paymentMethod = document.getElementById("paymentFilter").value;

  let url = "/api/checkout-records";
  const params = new URLSearchParams();
  if (dateFrom) params.set("date_from", dateFrom);
  if (dateTo)   params.set("date_to",   dateTo);
  if (paymentMethod) params.set("payment_method", paymentMethod);
  if (params.toString()) url += "?" + params.toString();

  fetch(url, { credentials: "include" })
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("checkout-records-container");

    if (!Array.isArray(data)) {
      container.innerHTML = `<p class="text-center text-danger py-4">Failed to load checkout records. Please refresh the page.</p>`;
      renderPaymentSummary([]);
      return;
    }

    const filtered = search
      ? data.filter(r => r.customer_name.toLowerCase().includes(search))
      : data;

    document.getElementById("checkout-count").innerText = `${filtered.length} record(s)`;
    renderPaymentSummary(filtered);

    if (!filtered.length) {
      container.innerHTML = `<p class="text-center text-muted py-4">No checkout records found.</p>`;
      return;
    }

    // --- Group by YYYY-MM (derived from created_date) ---
    const groups = {};
    for (const record of filtered) {
      // created_date is "YYYY-MM-DD"; fall back to parsing time_in if absent
      const raw = record.created_date || "";
      const key = raw.length >= 7 ? raw.slice(0, 7) : "Unknown";
      if (!groups[key]) groups[key] = [];
      groups[key].push(record);
    }

    // Sort groups newest-first
    const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

    let html = "";
    for (const key of sortedKeys) {
      const label   = key === "Unknown" ? "Unknown Date" : monthLabel(key);
      const records = groups[key];

      // Desktop table view
      html += `
        <div class="mb-4 d-none d-md-block">
          <h6 class="text-muted fw-semibold mb-2 border-bottom pb-1">${label}</h6>
          <div class="card shadow-sm">
            <div class="table-responsive">
              <table class="table table-striped mb-0">
                <thead>
                  <tr>
                    <th>Customer</th>
                    <th>Space</th>
                    <th>Time In</th>
                    <th>Time Out</th>
                    <th>Time Spent</th>
                    <th>Time Bill</th>
                    <th>Food Bill</th>
                    <th>Payment</th>
                    <th>Total</th>
                  </tr>
                </thead>
                <tbody>
                  ${records.map(record => `
                    <tr>
                      <td>${record.customer_name}</td>
                      <td>${record.space_type}</td>
                      <td>${record.time_in}</td>
                      <td>${record.time_out}</td>
                      <td>${formatTime(record.seconds_spent)}</td>
                      <td>₱${record.time_bill.toFixed(2)}</td>
                      <td>₱${record.food_bill.toFixed(2)}</td>
                      <td>${paymentBadge(record.payment_method)}</td>
                      <td><strong>₱${record.total_bill.toFixed(2)}</strong></td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;

      // Mobile card view
      html += `
        <div class="mb-4 d-md-none">
          <h6 class="text-muted fw-semibold mb-2 border-bottom pb-1">${label}</h6>
          <div class="d-flex flex-column gap-2">
            ${records.map(record => `
              <div class="checkout-record-card">
                <div class="checkout-card-header">
                  <div>
                    <div class="checkout-card-customer">${record.customer_name}</div>
                    <div class="checkout-card-space">${record.space_type}</div>
                  </div>
                  ${paymentBadge(record.payment_method)}
                </div>
                <div class="checkout-card-body">
                  <div class="checkout-card-row">
                    <span class="checkout-card-label">Date:</span>
                    <span class="checkout-card-value">${record.time_in.split(' ')[0]}</span>
                  </div>
                  <div class="checkout-card-row">
                    <span class="checkout-card-label">Duration:</span>
                    <span class="checkout-card-value">${formatTime(record.seconds_spent)}</span>
                  </div>
                  <div class="checkout-card-row">
                    <span class="checkout-card-label">Time Bill:</span>
                    <span class="checkout-card-value">₱${record.time_bill.toFixed(2)}</span>
                  </div>
                  <div class="checkout-card-row">
                    <span class="checkout-card-label">Food Bill:</span>
                    <span class="checkout-card-value">₱${record.food_bill.toFixed(2)}</span>
                  </div>
                </div>
                <div class="checkout-card-footer">
                  <span class="checkout-card-total">₱${record.total_bill.toFixed(2)}</span>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    container.innerHTML = html;
  })
  .catch(() => {
    document.getElementById("checkout-records-container").innerHTML =
      `<p class="text-center text-danger py-4">Failed to load checkout records. Please refresh the page.</p>`;
  });
}

loadCheckoutRecords();
window.createSmartPoller(loadCheckoutRecords, 20000);
</script>
{% endblock %}
